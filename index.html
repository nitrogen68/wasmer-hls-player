<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>HP Player</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body class="bg-black text-white min-h-screen flex flex-col items-center p-6">

<h1 class="text-2xl font-bold mb-6">
JJB player 
</h1>

<div class="w-full max-w-xl space-y-4">

<input
id="url"
placeholder="Paste m3u8 URL..."
class="w-full p-3 rounded bg-gray-800 border border-gray-700"
/>

<button
onclick="play()"
class="w-full bg-blue-600 p-3 rounded">
Stream Video
</button>

</div>

<div class="mt-8 w-full max-w-4xl">

<video id="video" controls class="w-full rounded"></video>

</div>
<script type="module">
import { createFFmpeg, fetchFile } 
from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js";

const ffmpeg = createFFmpeg({ log:true });

await ffmpeg.load();

console.log("FFmpeg Loaded");
</script>
<script>

function play(){

const url=document.getElementById("url").value;

const proxy =
location.origin + "?stream=" + encodeURIComponent(url);

const video=document.getElementById("video");

if(Hls.isSupported()){
const hls=new Hls();
hls.loadSource(proxy);
hls.attachMedia(video);
}else{
video.src=proxy;
}

}

</script>

</body>
</html>
